<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modern Space War</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-stage" aria-label="Modern Space War">
        <canvas id="game" width="1280" height="800"></canvas>
        <div class="hud hud-top">
          <div class="brand">SPACE WAR</div>
          <div id="roundState" class="status">READY</div>
          <button id="pauseButton" type="button" title="Pause or resume">II</button>
        </div>
        <div id="scoreboard" class="scoreboard" aria-live="polite"></div>
        <dialog id="setupDialog" class="setup">
          <form method="dialog">
            <h1>SPACE WAR</h1>
            <label>
              <span>Players</span>
              <input id="playerCount" type="range" min="2" max="6" value="4">
              <output id="playerCountOut">4</output>
            </label>
            <label>
              <span>Star</span>
              <input id="gravity" type="range" min="0" max="100" value="62">
              <output id="gravityOut">62</output>
            </label>
            <label>
              <span>Rounds</span>
              <input id="scoreLimit" type="number" min="1" max="25" value="7">
            </label>
            <label>
              <span>Mode</span>
              <select id="gameMode">
                <option value="free">Free-for-all</option>
                <option value="teams">Teams</option>
                <option value="bounty">Bounty</option>
                <option value="king">Gravity king</option>
              </select>
            </label>
            <label>
              <span>Orbit</span>
              <select id="orbitMode">
                <option value="mid">Mid</option>
                <option value="close">Close</option>
                <option value="far">Far</option>
                <option value="mixed">Mixed</option>
              </select>
            </label>
            <div class="toggle-grid" aria-label="Mutators">
              <label><input id="fuelMode" type="checkbox"> Fuel</label>
              <label><input id="debrisMode" type="checkbox"> Debris</label>
              <label><input id="moonMode" type="checkbox"> Moons</label>
              <label><input id="cometMode" type="checkbox"> Comet</label>
              <label><input id="variantMode" type="checkbox"> Variants</label>
              <label><input id="soundMode" type="checkbox"> Sound</label>
              <label><input id="attractMode" type="checkbox"> Attract</label>
            </div>
            <div class="tuning-panel">
              <div class="panel-title">Tuning</div>
              <label>
                <span>Turn</span>
                <input id="turnTune" type="range" min="50" max="150" value="100">
                <output id="turnTuneOut">100</output>
              </label>
              <label>
                <span>Thrust</span>
                <input id="thrustTune" type="range" min="50" max="150" value="100">
                <output id="thrustTuneOut">100</output>
              </label>
              <label>
                <span>Shot</span>
                <input id="shotTune" type="range" min="50" max="150" value="100">
                <output id="shotTuneOut">100</output>
              </label>
              <label>
                <span>Bots</span>
                <input id="botCount" type="range" min="0" max="5" value="0">
                <output id="botCountOut">0</output>
              </label>
              <label>
                <span>AI</span>
                <select id="botDifficulty">
                  <option value="rookie">Rookie</option>
                  <option value="standard" selected>Standard</option>
                  <option value="veteran">Veteran</option>
                  <option value="ace">Ace</option>
                </select>
              </label>
              <label class="wide-toggle">
                <span>Revenge</span>
                <input id="botRevenge" type="checkbox">
                <output></output>
              </label>
            </div>
            <div class="online-panel">
              <div class="panel-title">Online</div>
              <div class="online-row">
                <input id="roomCode" type="text" maxlength="6" placeholder="ROOM">
                <button id="hostRoom" class="secondary-button" type="button">HOST</button>
                <button id="joinRoom" class="secondary-button" type="button">JOIN</button>
                <button id="leaveRoom" class="secondary-button" type="button">OFFLINE</button>
              </div>
              <div id="onlineStatus" class="online-status">Offline</div>
            </div>
            <div class="controls-panel">
              <div class="panel-title">Controls</div>
              <div id="controlEditor" class="control-editor"></div>
              <div id="gamepadEditor" class="gamepad-editor"></div>
              <div id="gamepadStatus" class="gamepad-status">No gamepads detected</div>
              <div id="mouseEditor" class="mouse-editor"></div>
              <div class="mouse-status">Mouse or spinner: move rotates, left thrusts, right fires</div>
              <div class="profile-row">
                <button id="saveProfile" class="secondary-button" type="button">SAVE PROFILE</button>
                <button id="loadProfile" class="secondary-button" type="button">LOAD PROFILE</button>
                <button id="joinByInput" class="secondary-button" type="button">JOIN INPUT</button>
                <button id="connectHid" class="secondary-button" type="button">WEBHID</button>
              </div>
              <div id="inputStatus" class="mouse-status">Profiles, join-by-input, and WebHID ready</div>
              <button id="resetControls" class="secondary-button" type="button">RESET CONTROLS</button>
            </div>
            <button id="startButton" value="start" type="submit">START</button>
          </form>
        </dialog>
        <div id="touchControls" class="touch-controls" aria-label="Touch controls">
          <button data-touch="left" type="button">LEFT</button>
          <button data-touch="right" type="button">RIGHT</button>
          <button data-touch="thrust" type="button">THRUST</button>
          <button data-touch="fire" type="button">FIRE</button>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
